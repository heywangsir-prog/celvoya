<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎂 二十 · 启程</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1e;
            color: #f5f5f7;
        }

        #bgCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── 首屏 ─── */
        #start-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 30, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            cursor: pointer;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #start-screen.hidden {
            opacity: 0;
            transform: scale(1.02);
            pointer-events: none;
        }
        .start-label {
            font-weight: 300;
            font-size: 15px;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 24px;
        }
        .start-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 3s ease-in-out infinite;
            margin-bottom: 28px;
        }
        .start-ring::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 215, 140, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 140, 0.08);
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.06);
                opacity: 1;
            }
        }
        .start-sub {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.2);
        }

        /* ─── 倒计时卡片 ─── */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(30, 30, 36, 0.6);
            backdrop-filter: blur(40px) saturate(1.2);
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            padding: 44px 36px 36px;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .card.hide {
            opacity: 0;
            transform: translateY(-12px) scale(0.96);
            pointer-events: none;
        }

        .card-head {
            text-align: center;
            margin-bottom: 28px;
        }
        .card-head .pre {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 8px;
            display: block;
        }
        .card-head h1 {
            font-weight: 500;
            font-size: 22px;
            letter-spacing: 1px;
            color: #f5f5f7;
        }
        .card-head h1 em {
            font-style: normal;
            color: #ffd78c;
            font-weight: 600;
            text-shadow: 0 0 40px rgba(255, 215, 140, 0.08);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }
        .cd-block {
            text-align: center;
            min-width: 56px;
        }
        .cd-block .num {
            display: block;
            font-weight: 600;
            font-size: 40px;
            line-height: 1;
            color: #f5f5f7;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
        }
        .cd-block .label {
            display: block;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 6px;
            text-transform: uppercase;
        }
        .cd-divider {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.06);
            font-size: 18px;
            font-weight: 200;
        }

        .card-body {
            text-align: center;
        }
        .card-body .line {
            width: 24px;
            height: 2px;
            background: rgba(255, 215, 140, 0.2);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .card-body p {
            font-size: 14px;
            font-weight: 400;
            line-height: 2;
            letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.45);
        }
        .card-body p .highlight {
            color: #f5f5f7;
            font-weight: 500;
        }

        .hourglass-wrap {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #hgCanvas {
            filter: drop-shadow(0 0 12px rgba(255, 215, 140, 0.05));
            opacity: 0.6;
        }
        .hg-label {
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.12);
        }

        /* ─── 吹蜡烛场景 ─── */
        #candleScene {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            padding: 24px;
            background: rgba(26, 26, 30, 0.5);
            backdrop-filter: blur(12px);
        }
        #candleScene.visible {
            opacity: 1;
        }
        #candleScene.hide {
            opacity: 0;
            pointer-events: none;
        }

        .scene-title {
            font-weight: 300;
            font-size: 15px;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 36px;
        }

        .candle-group {
            display: flex;
            gap: 40px;
            margin-bottom: 4px;
            position: relative;
            z-index: 2;
        }
        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s;
        }
        .candle.blown {
            transform: translateY(4px);
        }

        .flame-wrap {
            position: relative;
            width: 20px;
            height: 32px;
            margin-bottom: 2px;
            transition: opacity 0.5s, transform 0.5s;
        }
        .flame {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 28px;
            background: radial-gradient(ellipse at 50% 70%, #fff7e0 0%, #f5c84a 30%, #e8a020 60%, transparent 100%);
            border-radius: 50% 50% 35% 35% / 60% 60% 30% 30%;
            animation: flicker 1.2s ease-in-out infinite alternate;
            filter: blur(0.2px);
        }
        .flame-inner {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 14px;
            background: radial-gradient(ellipse at 50% 70%, #fff 0%, #fffbe0 50%, transparent 100%);
            border-radius: 50% 50% 35% 35% / 60% 60% 30% 30%;
            animation: flicker 0.9s ease-in-out infinite alternate-reverse;
        }
        @keyframes flicker {
            0% {
                transform: translateX(-50%) scaleX(1) scaleY(1);
            }
            35% {
                transform: translateX(-50%) scaleX(0.85) scaleY(1.06);
            }
            70% {
                transform: translateX(-50%) scaleX(1.08) scaleY(0.92);
            }
            100% {
                transform: translateX(-50%) scaleX(0.92) scaleY(1.02);
            }
        }

        .candle.blown .flame-wrap {
            opacity: 0;
            transform: scale(0.6) translateY(10px);
        }

        .candle-body {
            width: 12px;
            height: 44px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.06);
            position: relative;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .candle-body .wick {
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
        }

        .cake-base {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -2px;
            z-index: 1;
            position: relative;
        }
        .cake-tier {
            border-radius: 4px 4px 0 0;
        }
        .cake-tier-1 {
            width: 160px;
            height: 18px;
            background: rgba(255, 255, 255, 0.04);
        }
        .cake-tier-2 {
            width: 180px;
            height: 24px;
            background: rgba(255, 255, 255, 0.06);
        }
        .cake-tier-3 {
            width: 200px;
            height: 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 0 0 8px 8px;
        }
        .cake-plate {
            width: 220px;
            height: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0 0 50% 50% / 0 0 100% 100%;
            margin-top: -1px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        .smoke {
            position: absolute;
            bottom: calc(100% - 2px);
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 0;
            opacity: 0;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.06), transparent);
        }
        .smoke.puffing {
            animation: rise 2s ease-out forwards;
        }
        @keyframes rise {
            0% {
                height: 0;
                opacity: 0.3;
                transform: translateX(-50%) scaleX(0.8);
                filter: blur(2px);
            }
            50% {
                height: 40px;
                opacity: 0.15;
                transform: translateX(-50%) scaleX(2);
                filter: blur(4px);
            }
            100% {
                height: 70px;
                opacity: 0;
                transform: translateX(-60%) scaleX(3);
                filter: blur(6px);
            }
        }

        .scene-actions {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .blow-hint {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.15);
            animation: hintPulse 3s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.7;
            }
        }
        .blow-btn {
            font-family: inherit;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 1px;
            padding: 10px 32px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 140, 0.15);
            background: rgba(255, 215, 140, 0.05);
            color: rgba(255, 215, 140, 0.7);
            cursor: pointer;
            transition: all 0.3s;
        }
        .blow-btn:hover {
            background: rgba(255, 215, 140, 0.1);
            border-color: rgba(255, 215, 140, 0.25);
            color: #ffd78c;
        }
        .blow-btn:disabled {
            opacity: 0.2;
            cursor: default;
            transform: scale(0.96);
        }

        /* ─── 最终祝语 ─── */
        #wishOverlay {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
            padding: 24px;
            background: rgba(26, 26, 30, 0.7);
            backdrop-filter: blur(24px);
        }
        #wishOverlay.visible {
            display: flex;
            opacity: 1;
        }

        .wish-card {
            max-width: 400px;
            width: 100%;
            background: rgba(30, 30, 36, 0.6);
            backdrop-filter: blur(40px) saturate(1.2);
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            padding: 44px 32px 36px;
            text-align: center;
            transform: scale(0.95);
            transition: transform 0.9s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #wishOverlay.visible .wish-card {
            transform: scale(1);
        }
        .wish-card .emoji {
            font-size: 36px;
            display: block;
            margin-bottom: 12px;
        }
        .wish-card h1 {
            font-weight: 500;
            font-size: 24px;
            letter-spacing: 1px;
            color: #f5f5f7;
            margin-bottom: 12px;
        }
        .wish-card h1 .accent {
            color: #ffd78c;
            font-weight: 600;
        }
        .wish-card .line-glow {
            width: 32px;
            height: 2px;
            background: rgba(255, 215, 140, 0.15);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .wish-card p {
            font-size: 14px;
            font-weight: 400;
            line-height: 2.2;
            letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.45);
        }
        .wish-card p .name {
            color: #f5f5f7;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 20px 28px;
            }
            .cd-block .num {
                font-size: 32px;
            }
            .countdown {
                gap: 10px;
            }
            .cd-block {
                min-width: 44px;
            }
            .cd-divider {
                font-size: 16px;
            }
            .card-head h1 {
                font-size: 18px;
            }
            .candle-group {
                gap: 24px;
            }
            .candle-body {
                height: 36px;
                width: 10px;
            }
            .flame-wrap {
                width: 16px;
                height: 26px;
            }
            .flame {
                width: 11px;
                height: 22px;
            }
            .flame-inner {
                width: 5px;
                height: 11px;
            }
            .cake-tier-1 {
                width: 120px;
                height: 14px;
            }
            .cake-tier-2 {
                width: 140px;
                height: 18px;
            }
            .cake-tier-3 {
                width: 160px;
                height: 24px;
            }
            .cake-plate {
                width: 180px;
                height: 5px;
            }
            .wish-card {
                padding: 28px 20px 24px;
            }
            .wish-card h1 {
                font-size: 20px;
            }
            .wish-card p {
                font-size: 13px;
            }
            .start-label {
                font-size: 13px;
                letter-spacing: 6px;
            }
            .start-ring {
                width: 48px;
                height: 48px;
            }
            .start-ring::after {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── 音频元素 ─── -->
    <audio id="bgMusic" src="1.mp3" loop preload="auto"></audio>

    <canvas id="bgCanvas"></canvas>

    <!-- ─── 首屏 ─── -->
    <div id="start-screen">
        <div class="start-label">✦ 启 ✦</div>
        <div class="start-ring"></div>
        <div class="start-sub">2026.09.05</div>
    </div>

    <!-- ─── 倒计时 ─── -->
    <div id="main-content">
        <div class="card" id="birthday-card">
            <div class="card-head">
                <span class="pre">— 距离 —</span>
                <h1>二十岁 · <em>还有</em></h1>
            </div>
            <div class="countdown">
                <div class="cd-block"><span class="num" id="days">00</span><span class="label">天</span></div>
                <div class="cd-divider">·</div>
                <div class="cd-block"><span class="num" id="hours">00</span><span class="label">时</span></div>
                <div class="cd-divider">·</div>
                <div class="cd-block"><span class="num" id="mins">00</span><span class="label">分</span></div>
                <div class="cd-divider">·</div>
                <div class="cd-block"><span class="num" id="secs">00</span><span class="label">秒</span></div>
            </div>
            <div class="card-body">
                <div class="line"></div>
                <p>给即将二十岁的你：<br />愿时光温柔，前路明亮。</p>
                <div class="hourglass-wrap">
                    <canvas id="hgCanvas" width="60" height="80"></canvas>
                    <div class="hg-label">时 光 流 转</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── 吹蜡烛场景 ─── -->
    <div id="candleScene">
        <div class="scene-title">✦ 许个愿吧 ✦</div>
        <div class="candle-group" id="candleGroup">
            <div class="candle" id="c0">
                <div class="flame-wrap"><div class="flame"></div><div class="flame-inner"></div><div class="smoke"></div></div>
                <div class="candle-body"><span class="wick"></span></div>
            </div>
            <div class="candle" id="c1">
                <div class="flame-wrap"><div class="flame"></div><div class="flame-inner"></div><div class="smoke"></div></div>
                <div class="candle-body"><span class="wick"></span></div>
            </div>
            <div class="candle" id="c2">
                <div class="flame-wrap"><div class="flame"></div><div class="flame-inner"></div><div class="smoke"></div></div>
                <div class="candle-body"><span class="wick"></span></div>
            </div>
        </div>
        <div class="cake-base">
            <div class="cake-tier cake-tier-1"></div>
            <div class="cake-tier cake-tier-2"></div>
            <div class="cake-tier cake-tier-3"></div>
            <div class="cake-plate"></div>
        </div>
        <div class="scene-actions">
            <div class="blow-hint">— 点击吹灭 —</div>
            <button class="blow-btn" id="blowBtn">吹灭蜡烛</button>
        </div>
    </div>

    <!-- ─── 最终祝语 ─── -->
    <div id="wishOverlay">
        <div class="wish-card">
            <span class="emoji">🎂</span>
            <h1><span class="accent">二十</span> · 此刻</h1>
            <div class="line-glow"></div>
            <p>
                致 <span class="name">你</span>，<br /><br />
                二十岁，明亮而自由。<br />
                去热爱，去经历，去成为自己。<br /><br />
                不负此刻，不畏将来。
            </p>
        </div>
    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 1. 深色柔光背景
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        (function initBg() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let W, H;

            function resize() { W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();

            const glows = [
                { dx: 0.2, dy: 0.25, color: 'rgba(255,215,140,0.04)' },
                { dx: 0.7, dy: 0.6, color: 'rgba(200,180,255,0.03)' },
                { dx: 0.4, dy: 0.85, color: 'rgba(255,180,140,0.03)' }
            ];

            const dots = [];
            for (let i = 0; i < 120; i++) {
                dots.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1 + 0.3,
                    a: Math.random() * 0.15 + 0.02,
                    speed: Math.random() * 0.004 + 0.001,
                    phase: Math.random() * Math.PI * 2
                });
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                const grad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, W * 0.8);
                grad.addColorStop(0, '#22222a');
                grad.addColorStop(0.6, '#1a1a1e');
                grad.addColorStop(1, '#121216');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                const time = Date.now() * 0.0003;
                glows.forEach(g => {
                    const cx = W * g.dx + Math.sin(time * 0.3 + g.dx * 3) * W * 0.04;
                    const cy = H * g.dy + Math.cos(time * 0.2 + g.dy * 2) * H * 0.04;
                    const r = Math.min(W, H) * 0.45;
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    const gd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                    gd.addColorStop(0, g.color);
                    gd.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gd;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                const t = Date.now() * 0.001;
                dots.forEach(d => {
                    const alpha = d.a * (0.5 + 0.5 * Math.sin(t * d.speed + d.phase));
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 2. 倒计时 & 沙漏
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const targetDate = new Date(2026, 8, 5, 0, 0, 0).getTime();
        const hgStart = new Date(2025, 8, 5, 0, 0, 0).getTime();
        const hgTotal = targetDate - hgStart;

        function drawHourglass(ratio) {
            const canvas = document.getElementById('hgCanvas');
            if (!canvas) return;
            const c = canvas.getContext('2d');
            const W = canvas.width,
                H = canvas.height;
            c.clearRect(0, 0, W, H);

            const cx = W / 2,
                topY = 3,
                botY = H - 3,
                midY = H / 2;
            const topW = W / 2 - 4,
                neckW = 2;

            function path() {
                c.beginPath();
                c.moveTo(cx - topW, topY);
                c.lineTo(cx + topW, topY);
                c.lineTo(cx + neckW, midY);
                c.lineTo(cx + topW, botY);
                c.lineTo(cx - topW, botY);
                c.lineTo(cx - neckW, midY);
                c.closePath();
            }

            function drawTop(r) {
                if (r < 0.01) return;
                const h = (midY - topY - 2) * r;
                const y0 = midY - 2 - h;
                const slope = (topW - neckW) / (midY - topY);
                const hw = neckW + slope * (midY - 2 - y0);
                c.save();
                c.beginPath();
                c.moveTo(cx - topW, topY);
                c.lineTo(cx + topW, topY);
                c.lineTo(cx + neckW, midY);
                c.lineTo(cx - neckW, midY);
                c.closePath();
                c.clip();
                c.beginPath();
                c.moveTo(cx - hw, y0);
                c.lineTo(cx + hw, y0);
                c.lineTo(cx + neckW, midY - 2);
                c.lineTo(cx - neckW, midY - 2);
                c.closePath();
                const gd = c.createLinearGradient(cx, y0, cx, midY);
                gd.addColorStop(0, 'rgba(255,215,140,0.2)');
                gd.addColorStop(1, 'rgba(255,215,140,0.5)');
                c.fillStyle = gd;
                c.fill();
                c.restore();
            }

            function drawBot(r) {
                const fill = 1 - r;
                if (fill < 0.01) return;
                const h = (botY - midY - 2) * fill;
                const y0 = botY - 2 - h;
                const slope = (topW - neckW) / (botY - midY);
                const hw = neckW + slope * (y0 - midY);
                c.save();
                c.beginPath();
                c.moveTo(cx + neckW, midY);
                c.lineTo(cx + topW, botY);
                c.lineTo(cx - topW, botY);
                c.lineTo(cx - neckW, midY);
                c.closePath();
                c.clip();
                c.beginPath();
                c.moveTo(cx - hw, y0);
                c.lineTo(cx + hw, y0);
                c.lineTo(cx + topW - 2, botY - 2);
                c.lineTo(cx - topW + 2, botY - 2);
                c.closePath();
                const gd = c.createLinearGradient(cx, y0, cx, botY);
                gd.addColorStop(0, 'rgba(255,215,140,0.4)');
                gd.addColorStop(1, 'rgba(255,215,140,0.15)');
                c.fillStyle = gd;
                c.fill();
                c.restore();
            }

            function drawStream(r) {
                if (r < 0.01) return;
                const a = Math.min(r * 3, 0.3);
                const gd = c.createLinearGradient(cx, midY, cx, midY + 6);
                gd.addColorStop(0, `rgba(255,215,140,${a})`);
                gd.addColorStop(1, 'rgba(255,215,140,0)');
                c.strokeStyle = gd;
                c.lineWidth = 1.2;
                c.lineCap = 'round';
                c.beginPath();
                c.moveTo(cx, midY - 1);
                c.lineTo(cx, midY + 6);
                c.stroke();
            }

            drawTop(ratio);
            drawBot(ratio);
            drawStream(ratio);

            path();
            c.strokeStyle = 'rgba(255,255,255,0.04)';
            c.lineWidth = 1;
            c.lineJoin = 'round';
            c.stroke();

            c.strokeStyle = 'rgba(255,215,140,0.08)';
            c.lineWidth = 1.5;
            c.lineCap = 'round';
            c.beginPath();
            c.moveTo(cx - topW - 1, topY);
            c.lineTo(cx + topW + 1, topY);
            c.stroke();
            c.beginPath();
            c.moveTo(cx - topW - 1, botY);
            c.lineTo(cx + topW + 1, botY);
            c.stroke();
        }

        let countdownTimer;

        function updateCountdown() {
            const gap = targetDate - Date.now();
            if (gap <= 0) {
                ['days', 'hours', 'mins', 'secs'].forEach(id => document.getElementById(id).innerText = '00');
                drawHourglass(0);
                clearInterval(countdownTimer);
                triggerTransition();
                return;
            }
            const d = Math.floor(gap / 86400000);
            const h = Math.floor((gap % 86400000) / 3600000);
            const m = Math.floor((gap % 3600000) / 60000);
            const s = Math.floor((gap % 60000) / 1000);
            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('mins').innerText = String(m).padStart(2, '0');
            document.getElementById('secs').innerText = String(s).padStart(2, '0');
            const ratio = Math.max(0, Math.min(1, gap / hgTotal));
            drawHourglass(ratio);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 3. 转场控制（倒计时 → 吹蜡烛）
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const startScreen = document.getElementById('start-screen');
        const mainContent = document.getElementById('main-content');
        const birthdayCard = document.getElementById('birthday-card');
        const bgMusic = document.getElementById('bgMusic');
        let isTransitioning = false;

        // 首屏点击 → 播放音乐 + 显示倒计时
        startScreen.addEventListener('click', () => {
            // 播放音乐（与之前版本一致）
            bgMusic.play().catch(() => {});

            startScreen.classList.add('hidden');
            setTimeout(() => {
                startScreen.style.display = 'none';
                mainContent.style.display = 'flex';
                setTimeout(() => birthdayCard.classList.add('visible'), 60);
                countdownTimer = setInterval(updateCountdown, 1000);
                updateCountdown();
            }, 800);
        });

        // 倒计时归零 → 自动转吹蜡烛
        function triggerTransition() {
            if (isTransitioning) return;
            isTransitioning = true;
            birthdayCard.classList.add('hide');
            setTimeout(() => {
                mainContent.style.display = 'none';
                const scene = document.getElementById('candleScene');
                scene.style.display = 'flex';
                setTimeout(() => scene.classList.add('visible'), 80);
            }, 700);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 4. 吹蜡烛 → 最终祝语
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const candles = [
            document.getElementById('c0'),
            document.getElementById('c1'),
            document.getElementById('c2')
        ];
        let blownCount = 0,
            candleDone = false;

        function blowCandle(idx) {
            if (!candles[idx] || candles[idx].classList.contains('blown')) return;
            candles[idx].classList.add('blown');
            const smoke = candles[idx].querySelector('.smoke');
            smoke.classList.add('puffing');
            blownCount++;
            if (blownCount >= candles.length && !candleDone) {
                candleDone = true;
                setTimeout(showFinalWish, 700);
            }
        }

        function blowAll() {
            if (candleDone) return;
            const btn = document.getElementById('blowBtn');
            btn.disabled = true;
            btn.style.opacity = '0.3';
            candles.forEach((_, i) => setTimeout(() => blowCandle(i), i * 150));
        }

        document.getElementById('blowBtn').addEventListener('click', (e) => { e.stopPropagation();
            blowAll(); });
        document.getElementById('candleScene').addEventListener('click', (e) => {
            if (e.target.id !== 'blowBtn' && !candleDone) blowAll();
        });

        function showFinalWish() {
            const scene = document.getElementById('candleScene');
            scene.classList.remove('visible');
            scene.classList.add('hide');
            setTimeout(() => {
                scene.style.display = 'none';
                const wish = document.getElementById('wishOverlay');
                wish.classList.add('visible');
            }, 800);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // 5. 自适应 & 键盘支持（空格吹灭）
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        window.addEventListener('resize', () => {
            const gap = targetDate - Date.now();
            if (gap > 0) {
                const ratio = Math.max(0, Math.min(1, gap / hgTotal));
                drawHourglass(ratio);
            }
        });

        setTimeout(() => {
            const gap = targetDate - Date.now();
            if (gap > 0) {
                const ratio = Math.max(0, Math.min(1, gap / hgTotal));
                drawHourglass(ratio);
            }
        }, 100);

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                const scene = document.getElementById('candleScene');
                if (scene.classList.contains('visible') && !candleDone) {
                    blowAll();
                }
            }
        });
    </script>

</body>
</html>
